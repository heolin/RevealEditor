<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RevealEditor demo deck</title>
  <!-- hand-written comment that must survive editing -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.2.1/dist/reveal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.2.1/dist/theme/serif.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.2.1/plugin/highlight/monokai.css">
  <style>
    /* user's own custom styles — the editor must never touch these */
    .brand { color: #e7ad52; letter-spacing: 0.05em; }
  </style>
<style data-revealeditor="managed">/* re:tables */
.re-table { border-collapse: collapse; margin: 0 auto; }
.re-table th, .re-table td { padding: 0.35em 0.7em; }
.re-table--bordered th, .re-table--bordered td { border: 1px solid currentColor; }
.re-table--striped tbody tr:nth-child(odd) { background: rgba(128, 128, 128, 0.18); }
.re-table--minimal th, .re-table--minimal td { border: none; }
.re-table--minimal thead th { border-bottom: 2px solid currentColor; }

/* re:free */
.reveal .slides section[data-re-free]:not([style*="display: none"]) {
  display: flex !important;
  flex-direction: column;
  justify-content: center;
}</style>
<link rel="stylesheet" href="design/acme/system.css">
</head>
<body>
  <div class="reveal">
    <div class="slides">
      <section data-background-color="#e6baba" data-transition="concave" style="height: 700px;" data-re-free="">
        <h3 class="brand" style="color: rgb(173, 50, 50); text-align: center; position: absolute; left: 272px; top: 57px; width: 332px; margin: 0px; padding: 20px; background-color: rgb(214, 154, 154);">RevealEditor</h3>
        <p style="position: absolute; left: 0px; top: 268px; width: 960px; margin: 0px;">A demo deck with <em>hand-written</em> markup.</p>
        <aside class="notes">Welcome everyone — intro slide.</aside>
      <table class="re-table re-table--bordered" style="width: 714px; position: absolute; left: 123px; top: 356px; margin: 0px;">
  <thead>
    <tr><th>Column 1</th><th>Column 2</th><th>Column 3</th></tr>
  </thead>
  <tbody>
    <tr><td></td><td></td><td>ds</td></tr>
    <tr><td></td><td></td><td>dsd</td></tr>
    <tr><td></td><td>ds</td><td></td></tr>
  </tbody>
</table><svg class="re-shape" xmlns="http://www.w3.org/2000/svg" style="position: absolute; left: 16px; top: 119px; width: 254px; height: 8px;" data-re-shape="{&quot;kind&quot;:&quot;line&quot;,&quot;fill&quot;:&quot;none&quot;,&quot;stroke&quot;:&quot;#2a78d6&quot;,&quot;strokeWidth&quot;:3,&quot;dash&quot;:&quot;solid&quot;,&quot;opacity&quot;:1,&quot;radius&quot;:4,&quot;x1&quot;:1,&quot;y1&quot;:0.603,&quot;x2&quot;:0,&quot;y2&quot;:0.397,&quot;heads&quot;:&quot;start&quot;,&quot;snapGap&quot;:10}" viewBox="0 0 254 8" preserveAspectRatio="none"><line x1="240.5" y1="4.47" x2="1.5" y2="3.49" stroke="#2a78d6" stroke-width="3" stroke-linecap="round"></line><path d="M252.5,4.51 L240.52,-0.93 L240.48,9.87 Z" fill="#2a78d6"></path></svg></section>
      <section>
        <section>
        <h2>Code</h2>
        
      <ul>
  <li>First item</li>
  <li>Second item</li>
</ul></section>
        <section style="height: 700px; display: flex; flex-direction: column; justify-content: center;">
          
        <pre style="position: absolute; left: 48px; top: 319px; width: 864px; margin: 0px;"><code class="language-python" data-trim="">
const answer = 42
</code></pre></section>
</section>
      <section>
        <section>
          <h2>Vertical stack — top</h2>
          <p>Press down to continue.</p>
        </section>
        <section>
          <h2>Vertical stack — bottom</h2>
          <blockquote>&ldquo;Nested slides work too.&rdquo;</blockquote>
        </section>
      </section>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.2.1/dist/reveal.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.2.1/plugin/highlight/highlight.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.2.1/plugin/notes/notes.js"></script>
  <script>
    Reveal.initialize({
      hash: true,
      // user comment inside config — must survive byte-for-byte
      plugins: [RevealHighlight, RevealNotes]
    });
  </script>
</body>
</html>
