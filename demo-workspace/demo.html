<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RevealEditor demo deck</title>
  <!-- hand-written comment that must survive editing -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.2.1/dist/reveal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.2.1/dist/theme/serif.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.2.1/plugin/highlight/monokai.css">
  <style>
    /* user's own custom styles — the editor must never touch these */
    .brand { color: #e7ad52; letter-spacing: 0.05em; }
  </style>
</head>
<body>
  <div class="reveal">
    <div class="slides">
      <section data-background-color="#e6baba" data-transition="concave" style="height: 700px;">
        <h1 class="brand" style="position: absolute; left: -18px; top: 225px; width: 960px; margin: 0px;">RevealEditor</h1>
        <p style="position: absolute; left: 0px; top: 397px; width: 960px; margin: 0px;">A demo deck with <em>hand-written</em> markup.</p>
        <aside class="notes">Welcome everyone — intro slide.</aside>
      </section>
      <section>
        <h2>Code</h2>
        
      <ul>
  <li>First item</li>
  <li>Second item</li>
</ul></section>
      <section>
        <section>
          <h2>Vertical stack — top</h2>
          <p>Press down to continue.</p>
        </section>
        <section>
          <h2>Vertical stack — bottom</h2>
          <blockquote>&ldquo;Nested slides work too.&rdquo;</blockquote>
        </section>
      </section>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.2.1/dist/reveal.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.2.1/plugin/highlight/highlight.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.2.1/plugin/notes/notes.js"></script>
  <script>
    Reveal.initialize({
      hash: true,
      // user comment inside config — must survive byte-for-byte
      plugins: [RevealHighlight, RevealNotes]
    });
  </script>
</body>
</html>
