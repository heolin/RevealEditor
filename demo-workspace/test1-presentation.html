<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>New presentation</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.2.1/dist/reveal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.2.1/dist/theme/beige.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.2.1/plugin/highlight/monokai.css">
<style data-revealeditor="managed">/* re:tables */
.re-table { border-collapse: collapse; margin: 0 auto; }
.re-table th, .re-table td { padding: 0.35em 0.7em; }
.re-table--bordered th, .re-table--bordered td { border: 1px solid currentColor; }
.re-table--striped tbody tr:nth-child(odd) { background: rgba(128, 128, 128, 0.18); }
.re-table--minimal th, .re-table--minimal td { border: none; }
.re-table--minimal thead th { border-bottom: 2px solid currentColor; }

/* re:layout */
.re-cols { display: flex; gap: 24px; width: 100%; align-items: stretch; }
.re-col { flex: 1 1 0; min-width: 0; }
.re-cell { width: 100%; }</style>
</head>
<body>
  <div class="reveal">
    <div class="slides">
      <section>
        <h1>New presentation</h1>
      <table class="re-table re-table--bordered fragment">
  
  <thead><tr><th>Column 1</th><th>Column 2</th><th>Column 3</th></tr></thead><tbody>
    <tr><td></td><td></td><td></td></tr>
    <tr><td></td><td></td><td></td></tr>
    <tr><td></td><td></td><td></td></tr>
  </tbody>
</table></section>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.2.1/dist/reveal.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.2.1/plugin/highlight/highlight.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.2.1/plugin/notes/notes.js"></script>
  <script>
    Reveal.initialize({ hash: true, plugins: [RevealHighlight, RevealNotes] });
  </script>
</body>
</html>
