<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <base id="re-base" href="/">
  <title>Preview</title>
  <link rel="stylesheet" href="/vendor/reveal.js/dist/reveal.css">
  <link rel="stylesheet" id="re-theme" href="/vendor/reveal.js/dist/theme/black.css">
  <link rel="stylesheet" href="/vendor/reveal.js/plugin/highlight/monokai.css">
  <style id="re-user"></style>
  <style id="re-managed"></style>
  <style>html, body { margin: 0; height: 100%; background: #111; }</style>
</head>
<body>
  <div class="reveal">
    <div class="slides"></div>
  </div>
  <script src="/vendor/reveal.js/dist/reveal.js"></script>
  <script src="/vendor/reveal.js/plugin/highlight/highlight.js"></script>
  <script src="/vendor/reveal.js/plugin/notes/notes.js"></script>
  <script>
    // Disposable reveal.js runtime. Receives slides via postMessage; nothing is
    // ever read back from this document — one-way data flow by design.
    let deck = null;
    const extraLinks = new Set();
    window.__debug = { messages: [] }; // introspection for automated tests

    function applyHead(m) {
      if (m.baseHref) document.getElementById('re-base').href = m.baseHref;
      const themeLink = document.getElementById('re-theme');
      if (m.themeHref) {
        themeLink.href = m.themeHref;
        themeLink.disabled = false;
      } else {
        // Custom-styled deck with no theme link — inject nothing.
        themeLink.disabled = true;
      }
      document.getElementById('re-user').textContent = (m.headStyles || []).join('\n\n');
      document.getElementById('re-managed').textContent = m.managedCss || '';
      (m.extraStylesheets || []).forEach((href) => {
        if (extraLinks.has(href)) return;
        extraLinks.add(href);
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = href;
        document.head.appendChild(link);
      });
    }

    function rehighlight() {
      try {
        const hl = deck && deck.getPlugin('highlight');
        if (hl && hl.hljs) {
          document.querySelectorAll('.reveal pre code').forEach((el) => {
            if (!el.dataset.highlighted) hl.hljs.highlightElement(el);
          });
        }
      } catch (e) { /* display-only */ }
    }

    // Sync application must be SERIALIZED: a second sync replacing .slides
    // innerHTML while Reveal.initialize() is still awaiting leaves reveal
    // registered against detached nodes — wrong slide counts, clamped
    // navigation, broken layout. Only the latest pending sync matters.
    let busy = false;
    let pending = null;

    async function applySync(m) {
      applyHead(m);
      document.querySelector('.slides').innerHTML = m.slidesHtml;
      if (!deck) {
        deck = new Reveal(document.querySelector('.reveal'), {
          hash: false,
          embedded: false,
          width: m.width || 960,
          height: m.height || 700,
          center: m.center !== false,
          margin: typeof m.margin === 'number' ? m.margin : 0.04,
          // Reveal 5 auto-switches narrow viewports (<435px) to scroll view,
          // which flattens stacks into .scroll-page divs — breaking (h,v)
          // navigation and layout. The preview pane is 380px wide: never.
          scrollActivationWidth: null,
          plugins: [RevealHighlight, RevealNotes],
        });
        await deck.initialize();
      } else {
        try {
          deck.sync();
          rehighlight();
        } catch (e) {
          location.reload(); // parent re-sends on harness-loaded
          return;
        }
      }
      if (typeof m.h === 'number') deck.slide(m.h, m.v || 0);
    }

    window.addEventListener('message', async (event) => {
      const m = event.data || {};
      window.__debug.messages.push({ type: m.type, h: m.h, v: m.v, t: Date.now() });
      window.__debug.deck = deck;
      if (m.slidesHtml !== undefined) window.__debug.lastSlidesHtml = m.slidesHtml;
      if (m.type === 'sync') {
        if (busy) {
          pending = m; // coalesce: only the latest matters
          return;
        }
        busy = true;
        try {
          await applySync(m);
          while (pending) {
            const next = pending;
            pending = null;
            await applySync(next);
          }
        } finally {
          busy = false;
        }
      } else if (m.type === 'navigate' && deck && !busy) {
        deck.slide(m.h, m.v || 0);
      }
    });

    window.parent.postMessage({ type: 'harness-loaded' }, '*');
  </script>
</body>
</html>
